<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#4a7c59"/>
  <!-- Book pages -->
  <rect x="16" y="20" width="14" height="24" rx="2" fill="#fff" opacity="0.95"/>
  <rect x="34" y="20" width="14" height="24" rx="2" fill="#fff" opacity="0.85"/>
  <!-- Spine -->
  <rect x="29" y="19" width="6" height="26" rx="1" fill="#2d5a3d"/>
  <!-- Lines on left page -->
  <rect x="19" y="26" width="8" height="1.5" rx="1" fill="#4a7c59" opacity="0.5"/>
  <rect x="19" y="30" width="8" height="1.5" rx="1" fill="#4a7c59" opacity="0.5"/>
  <rect x="19" y="34" width="6" height="1.5" rx="1" fill="#4a7c59" opacity="0.5"/>
  <!-- Lines on right page -->
  <rect x="37" y="26" width="8" height="1.5" rx="1" fill="#4a7c59" opacity="0.5"/>
  <rect x="37" y="30" width="8" height="1.5" rx="1" fill="#4a7c59" opacity="0.5"/>
  <rect x="37" y="34" width="6" height="1.5" rx="1" fill="#4a7c59" opacity="0.5"/>
  <!-- Small star/sparkle accent -->
  <circle cx="46" cy="18" r="3" fill="#f0c040"/>
  <rect x="45.2" y="12" width="1.6" height="4" rx="0.8" fill="#f0c040"/>
  <rect x="45.2" y="20" width="1.6" height="4" rx="0.8" fill="#f0c040"/>
  <rect x="40" y="17.2" width="4" height="1.6" rx="0.8" fill="#f0c040"/>
  <rect x="48" y="17.2" width="4" height="1.6" rx="0.8" fill="#f0c040"/>
</svg>
