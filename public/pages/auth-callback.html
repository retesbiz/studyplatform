<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Signing in… — StudyNest</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .cb-box { text-align: center; }
  .cb-spinner {
    width: 48px; height: 48px;
    border: 4px solid var(--acc-lt);
    border-top-color: var(--acc);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="cb-box">
  <div class="cb-spinner"></div>
  <h3>Signing you in…</h3>
  <p>You'll be redirected in a moment.</p>
</div>
<script>
  (function () {
    const params = new URLSearchParams(window.location.search);
    const token  = params.get('token');
    const user   = params.get('user');

    if (token && user) {
      try {
        localStorage.setItem('token', token);
        localStorage.setItem('user', decodeURIComponent(user));
        window.location.replace('dashboard.html');
      } catch {
        window.location.replace('login.html?error=storage_error');
      }
    } else {
      window.location.replace('login.html?error=oauth_failed');
    }
  })();
</script>
</body>
</html>
