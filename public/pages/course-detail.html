<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<title>Course — StudyNest</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  .course-hero {
    background: linear-gradient(135deg, var(--acc), var(--acc2));
    border-radius: var(--rad-xl);
    padding: 40px;
    color: #fff;
    display: flex;
    align-items: flex-start;
    gap: 28px;
    margin-bottom: 28px;
  }
  .course-hero-icon {
    width: 80px; height: 80px;
    background: rgba(255,255,255,0.15);
    border-radius: var(--rad-lg);
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; flex-shrink: 0;
  }
  .course-hero h1 { color: #fff; font-size: clamp(20px,2.5vw,28px); margin-bottom: 8px; }
  .course-hero p  { color: rgba(255,255,255,0.82); font-size: 15px; max-width: 600px; line-height: 1.7; }
  .course-hero-meta { display: flex; gap: 20px; margin-top: 16px; flex-wrap: wrap; }
  .course-hero-meta span { color: rgba(255,255,255,0.85); font-size: 13px; display: flex; align-items: center; gap: 6px; }
  .course-action-bar {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--rad-lg); padding: 16px 24px;
    margin-bottom: 28px; gap: 16px; flex-wrap: wrap;
    box-shadow: var(--shadow-sm);
  }
  .learn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 28px; }
  .learn-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--rad); font-size: 14px; color: var(--ink2);
  }
  .learn-check { color: var(--acc); font-size: 15px; flex-shrink: 0; margin-top: 1px; font-weight: 700; }
  .accordion-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--rad-lg); margin-bottom: 10px; overflow: hidden;
  }
  .accordion-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; cursor: pointer; user-select: none; transition: background 0.15s;
  }
  .accordion-header:hover { background: var(--bg2); }
  .accordion-header.open  { background: var(--acc-lt); }
  .accordion-left { display: flex; align-items: center; gap: 14px; }
  .accordion-num {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--bg2); border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: var(--ink3); flex-shrink: 0;
  }
  .accordion-header.open .accordion-num { background: var(--acc); border-color: var(--acc); color: #fff; }
  .accordion-title    { font-size: 15px; font-weight: 600; color: var(--ink); }
  .accordion-duration { font-size: 12px; color: var(--ink3); margin-top: 2px; }
  .accordion-arrow    { color: var(--ink3); font-size: 18px; transition: transform 0.2s; flex-shrink: 0; }
  .accordion-header.open .accordion-arrow { transform: rotate(180deg); color: var(--acc); }
  .accordion-body { display: none; padding: 0 20px 18px 62px; }
  .accordion-body.open { display: block; }
  .accordion-desc { font-size: 14px; color: var(--ink2); margin-bottom: 12px; line-height: 1.7; }
  .topic-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .topic-chip {
    padding: 4px 12px; border-radius: 100px;
    background: var(--acc-lt); color: var(--acc);
    font-size: 12px; font-weight: 500;
  }
  .progress-section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--rad-lg); padding: 20px 24px; margin-bottom: 28px;
  }
  @media (max-width: 768px) {
    .course-hero { flex-direction: column; padding: 24px; }
    .learn-grid  { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="sidebar-logo-mark">📚</div><span class="sidebar-logo-text">StudyNest</span></div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Main</div>
      <a class="sidebar-link" href="dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a>
      <a class="sidebar-link active" href="courses.html"><span class="nav-icon">🎓</span> Courses</a>
      <a class="sidebar-link" href="notes.html"><span class="nav-icon">📝</span> My Notes</a>
      <a class="sidebar-link" href="quiz.html"><span class="nav-icon">🧠</span> Quizzes</a>
      <a class="sidebar-link" href="discussions.html"><span class="nav-icon">💬</span> Community</a>
      <a class="sidebar-link" href="leaderboard.html"><span class="nav-icon">🏆</span> Leaderboard</a>
      
      <div class="sidebar-section-label">Account</div>
      <a class="sidebar-link" href="profile.html"><span class="nav-icon">👤</span> Profile</a>
    </nav>
    <div class="sidebar-user">
      <div class="sidebar-avatar" id="sb-avatar">?</div>
      <div><div class="sidebar-user-name" id="sb-name">Loading…</div><div class="sidebar-user-role">Student</div></div>
      <button class="sidebar-user-logout" onclick="logout()" title="Log out">↩</button>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <a href="courses.html" style="font-size:13px;color:var(--ink3);display:flex;align-items:center;gap:4px;white-space:nowrap">← Back to Courses</a>
      <div class="topbar-actions" style="margin-left:auto">
        <div class="avatar-placeholder avatar-sm" id="topbar-avatar" style="cursor:pointer" onclick="location.href='profile.html'">?</div>
      </div>
    </header>

    <div class="page-body" id="page-body">
      <div class="empty-state" style="padding:80px">
        <div class="empty-state-icon">⏳</div><h4>Loading course…</h4>
      </div>
    </div>
  </div>
</div>

<!-- Floating highlight toolbar -->
<div id="hl-toolbar" class="hidden">
  <div class="hl-dot" style="background:#fef08a" title="Yellow" onclick="applyHighlight('yellow')"></div>
  <div class="hl-dot" style="background:#bbf7d0" title="Green"  onclick="applyHighlight('green')"></div>
  <div class="hl-dot" style="background:#fecdd3" title="Pink"   onclick="applyHighlight('pink')"></div>
  <div class="hl-sep"></div>
  <div class="hl-erase" onclick="eraseHighlight()">✕ Remove</div>
</div>

<!-- Term definition popup -->
<div id="term-overlay" class="hidden" onclick="closeTermPopup(event)">
  <div id="term-popup">
    <button class="tp-close" onclick="closeTermPopup()">✕</button>
    <div id="term-popup-title"></div>
    <div id="term-popup-body"></div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<style>
  .content-heading { font-size: 14px; font-weight: 700; color: var(--ink); margin: 16px 0 8px; }
  .content-list { padding-left: 20px; font-size: 14px; color: var(--ink2); line-height: 2; }
  .content-list li { margin-bottom: 2px; }
  .module-content { margin-bottom: 14px; font-size: 14px; color: var(--ink2); line-height: 1.8; }
  .module-content p { margin-bottom: 10px; }
  .module-content strong { color: var(--ink); }
  .module-content code { background: var(--bg2); padding: 1px 5px; border-radius: 4px; font-size: 13px; font-family: monospace; }

  /* ── Expandable terms ── */
  .xterm { border-bottom:2px dashed var(--acc);cursor:pointer;padding:1px 2px;border-radius:2px;transition:background .15s; }
  .xterm:hover { background:var(--acc-lt); }

  /* ── Highlights ── */
  mark.hl { border-radius:3px;padding:1px 0; }
  mark.hl-yellow { background:#fef08a; color:#713f12; }
  mark.hl-green  { background:#bbf7d0; color:#14532d; }
  mark.hl-pink   { background:#fecdd3; color:#881337; }

  /* ── Floating highlight toolbar ── */
  #hl-toolbar { position:fixed;z-index:9999;background:#1e293b;border-radius:10px;padding:6px 10px;display:flex;gap:8px;align-items:center;box-shadow:0 4px 20px rgba(0,0,0,.3);pointer-events:all;transition:opacity .15s; }
  #hl-toolbar.hidden { display:none; }
  .hl-dot { width:22px;height:22px;border-radius:50%;cursor:pointer;border:2.5px solid rgba(255,255,255,.5);transition:transform .15s; }
  .hl-dot:hover { transform:scale(1.3); }
  .hl-sep { width:1px;height:18px;background:rgba(255,255,255,.2); }
  .hl-erase { color:#fff;font-size:12px;cursor:pointer;padding:2px 8px;border-radius:5px;background:rgba(255,255,255,.15);transition:background .15s;white-space:nowrap; }
  .hl-erase:hover { background:rgba(255,255,255,.3); }

  /* ── Term popup ── */
  #term-overlay { position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:10000;display:flex;align-items:flex-end;justify-content:center;padding:0 0 0 0; }
  #term-overlay.hidden { display:none; }
  #term-popup { background:var(--surface);border-radius:var(--rad-xl) var(--rad-xl) 0 0;padding:28px 28px 36px;max-width:580px;width:100%;max-height:75vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.2);animation:slideUp .25s ease; }
  @keyframes slideUp { from{transform:translateY(30px);opacity:0} to{transform:translateY(0);opacity:1} }
  #term-popup-title { font-family:var(--fh);font-size:21px;font-weight:800;color:var(--ink);margin-bottom:14px;padding-right:36px; }
  #term-popup-body { font-size:14px;color:var(--ink2);line-height:1.8; }
  #term-popup-body p { margin-bottom:10px; }
  .tp-close { position:absolute;top:16px;right:16px;background:var(--bg2);border:none;border-radius:50%;width:32px;height:32px;font-size:18px;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center; }
  #term-popup { position:relative; }

  /* ── Content collapse ── */
  .content-wrap { position:relative; }
  .content-wrap.collapsed .module-content { max-height:90px;overflow:hidden; }
  .content-fade { position:absolute;bottom:0;left:0;right:0;height:50px;background:linear-gradient(transparent,var(--surface));pointer-events:none; }
  .content-wrap.expanded .content-fade { display:none; }
  .content-toggle { background:none;border:1.5px solid var(--border);border-radius:var(--rad);color:var(--acc);font-size:13px;font-weight:600;cursor:pointer;padding:6px 14px;margin-top:8px;transition:all .15s; }
  .content-toggle:hover { background:var(--acc-lt);border-color:var(--acc); }

  /* ── Phrase chips ── */
  .phrase-chips { margin-top:12px;padding:12px 16px;background:var(--bg2);border-radius:var(--rad-lg);border:1px solid var(--border); }
  .phrase-chips-label { font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px; }
  .phrase-chips-row { display:flex;flex-wrap:wrap;gap:6px; }
  .phrase-chip { padding:5px 14px;border-radius:100px;border:1.5px solid var(--acc);background:var(--acc-lt);color:var(--acc);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s; }
  .phrase-chip:hover { background:var(--acc);color:#fff;transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.1); }

  /* ── Flashcards ── */
  .fc-section { margin-bottom: 20px; }
  .fc-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .fc-label { font-size:13px; font-weight:700; color:var(--acc); display:flex; align-items:center; gap:6px; }
  .fc-counter { font-size:12px; color:var(--ink3); }
  .fc-stage { perspective: 1000px; height: 160px; margin-bottom:10px; cursor:pointer; }
  .fc-card { width:100%; height:100%; position:relative; transform-style:preserve-3d; transition:transform .45s ease; }
  .fc-card.flipped { transform: rotateY(180deg); }
  .fc-front, .fc-back {
    position:absolute; inset:0;
    backface-visibility:hidden; -webkit-backface-visibility:hidden;
    border-radius:var(--rad-lg); padding:20px 24px;
    display:flex; align-items:center; justify-content:center; text-align:center;
  }
  .fc-front { background:var(--acc); color:#fff; font-size:15px; font-weight:600; line-height:1.5; }
  .fc-back  { background:var(--surface); border:2px solid var(--acc); color:var(--ink2); font-size:13px; line-height:1.6; transform:rotateY(180deg); }
  .fc-controls { display:flex; align-items:center; gap:8px; }
  .fc-btn { padding:5px 14px; border-radius:var(--rad); border:1.5px solid var(--border); background:var(--surface); font-size:13px; cursor:pointer; transition:all .15s; color:var(--ink2); }
  .fc-btn:hover { border-color:var(--acc); color:var(--acc); }
  .fc-btn:disabled { opacity:.35; cursor:not-allowed; }
  .fc-shuffle { margin-left:auto; font-size:12px; }
</style>
<script src="../js/app.js"></script>
<script src="../js/course-content.js"></script>
<script src="../js/flashcards.js"></script>
<script>
initPage();

const courseId = new URLSearchParams(location.search).get('id');
if (!courseId) location.href = 'courses.html';

async function loadCourse() {
  const c = await api('GET', '/courses/' + courseId);
  if (!c) return;

  document.title = c.title + ' — StudyNest';

  const levelClass = c.level === 'Beginner' ? 'badge-green' : c.level === 'Advanced' ? 'badge-red' : 'badge-amber';
  const allTopics  = (c.moduleList || []).flatMap(m => m.topicList || []).slice(0, 12);

  document.getElementById('page-body').innerHTML = `
    <div class="course-hero">
      <div class="course-hero-icon">${c.icon}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
          <span class="badge badge-gray">${c.subject}</span>
          <span class="badge ${levelClass}">${c.level}</span>
        </div>
        <h1>${c.title}</h1>
        <p>${c.description || ''}</p>
        <div class="course-hero-meta">
          <span>📦 ${c.modules} modules</span>
          <span>⏱ ${c.duration}</span>
          <span>⭐ ${c.rating} rating</span>
          <span>👥 ${(c.students || 0).toLocaleString()} students</span>
        </div>
      </div>
    </div>

    ${c.enrolled ? `
    <div class="progress-section">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="font-weight:600;font-size:15px">Your Progress</div>
        <div style="font-weight:700;color:var(--acc)">${c.progress || 0}%</div>
      </div>
      <div class="progress-bar" style="height:10px">
        <div class="progress-fill" style="width:${c.progress || 0}%"></div>
      </div>
      ${c.completed ? '<div style="margin-top:10px;font-size:13px;color:var(--acc);font-weight:600">✅ You completed this course!</div>' : ''}
    </div>` : ''}

    <div class="course-action-bar">
      <div>
        <div style="font-weight:600;font-size:15px">${c.enrolled ? (c.completed ? 'Course Completed' : 'Continue Learning') : 'Start Learning Today'}</div>
        <div style="font-size:13px;color:var(--ink3);margin-top:2px">${c.enrolled
          ? (c.completed ? 'Great work! Review the modules below anytime.' : 'Keep going — you\'re making great progress.')
          : 'Free to enrol — no credit card required.'}</div>
      </div>
      ${c.enrolled
        ? (c.completed
          ? `<button class="btn btn-ghost" disabled>✅ Completed</button>`
          : `<button class="btn btn-primary" onclick="updateProgress(${Math.min(100,(c.progress||0)+10)})">▶ Continue (+10%)</button>`)
        : `<button class="btn btn-primary" id="enrol-btn" onclick="enrol()">Enrol Free →</button>`
      }
    </div>

    ${allTopics.length ? `
    <div class="section-title">What You'll Learn</div>
    <div class="learn-grid">
      ${allTopics.map(t => `
        <div class="learn-item">
          <span class="learn-check">✓</span>
          <span>${t}</span>
        </div>`).join('')}
    </div>` : ''}

    <div class="section-title" style="margin-top:8px">${(c.moduleList||[]).length} Modules</div>
    <div id="modules-list">
      ${(c.moduleList || []).map((m, i) => `
        <div class="accordion-item">
          <div class="accordion-header" onclick="toggleAccordion(${m.id})">
            <div class="accordion-left">
              <div class="accordion-num" id="num-${m.id}">${i+1}</div>
              <div>
                <div class="accordion-title">${m.title}</div>
                <div class="accordion-duration">⏱ ${m.duration}</div>
              </div>
            </div>
            <span class="accordion-arrow" id="arrow-${m.id}">▾</span>
          </div>
          <div class="accordion-body" id="body-${m.id}">
            ${(typeof FLASHCARDS !== 'undefined' && FLASHCARDS[m.id] && FLASHCARDS[m.id].length) ? `
            <div class="fc-section">
              <div class="fc-header">
                <div class="fc-label">📇 Flashcards <span style="font-weight:400;color:var(--ink3)">(click card to flip)</span></div>
                <div class="fc-counter" id="fc-counter-${m.id}">1 / ${FLASHCARDS[m.id].length}</div>
              </div>
              <div class="fc-stage" onclick="flipCard(${m.id})">
                <div class="fc-card" id="fc-card-${m.id}">
                  <div class="fc-front" id="fc-front-${m.id}">${FLASHCARDS[m.id][0].q}</div>
                  <div class="fc-back"  id="fc-back-${m.id}">${FLASHCARDS[m.id][0].a}</div>
                </div>
              </div>
              <div class="fc-controls">
                <button class="fc-btn" id="fc-prev-${m.id}" onclick="event.stopPropagation();fcNav(${m.id},-1)" disabled>← Prev</button>
                <button class="fc-btn" id="fc-next-${m.id}" onclick="event.stopPropagation();fcNav(${m.id},+1)" ${FLASHCARDS[m.id].length <= 1 ? 'disabled' : ''}>Next →</button>
                <button class="fc-btn fc-shuffle" onclick="event.stopPropagation();fcShuffle(${m.id})">🔀 Shuffle</button>
              </div>
            </div>` : ''}
            ${(typeof COURSE_CONTENT !== 'undefined' && COURSE_CONTENT[m.id])
              ? `<div class="module-content">${COURSE_CONTENT[m.id]}</div>`
              : `<div class="accordion-desc">${m.description || ''}</div>`}
            ${m.topicList && m.topicList.length ? `
            <div class="topic-chips">
              ${m.topicList.map(t => `<span class="topic-chip">${t}</span>`).join('')}
            </div>` : ''}
          </div>
        </div>`).join('')}
    </div>
  `;
}

function toggleAccordion(id) {
  const header = document.querySelector(`.accordion-header[onclick="toggleAccordion(${id})"]`);
  const body   = document.getElementById('body-' + id);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  header.classList.toggle('open', !isOpen);
  if (!isOpen) initModuleContent(id);
}

async function enrol() {
  const btn = document.getElementById('enrol-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Enrolling…'; }
  const res = await api('POST', '/courses/' + courseId + '/enroll');
  if (res) { toast('Enrolled! 🎉', 'success'); loadCourse(); }
  else if (btn) { btn.disabled = false; btn.textContent = 'Enrol Free →'; }
}

async function updateProgress(progress) {
  await api('PATCH', '/courses/' + courseId + '/progress', { progress });
  toast(progress >= 100 ? 'Course completed! 🎉' : 'Progress saved!', 'success');
  loadCourse();
}

loadCourse();

// ══════════════════════════════════════════════════════════════════════════════
//  MODULE CONTENT ENHANCEMENTS
// ══════════════════════════════════════════════════════════════════════════════

const _initDone = new Set();

function initModuleContent(moduleId) {
  if (_initDone.has(moduleId)) return;
  _initDone.add(moduleId);

  const body = document.getElementById('body-' + moduleId);
  if (!body) return;
  const mc = body.querySelector('.module-content');
  if (!mc) return;

  // ── 1. Collect key terms first ────────────────────────────────────────────
  const terms = [];
  mc.querySelectorAll('.content-list li').forEach(li => {
    const strong = li.querySelector('strong');
    if (!strong || strong.dataset.wired) return;
    strong.dataset.wired = '1';
    strong.classList.add('xterm');
    const term = strong.textContent.replace(/:$/, '').trim();
    terms.push({ term, li });
    strong.addEventListener('click', e => { e.stopPropagation(); openTermDetail(term, li, moduleId); });
  });

  // ── 2. Wrap in collapsible container ──────────────────────────────────────
  const wrap = document.createElement('div');
  wrap.className = 'content-wrap collapsed';
  mc.parentNode.insertBefore(wrap, mc);
  wrap.appendChild(mc);

  const fade = document.createElement('div');
  fade.className = 'content-fade';
  wrap.appendChild(fade);

  const toggleBtn = document.createElement('button');
  toggleBtn.className = 'content-toggle';
  toggleBtn.textContent = '↓ Show full notes';
  toggleBtn.onclick = () => {
    const collapsed = wrap.classList.toggle('collapsed');
    wrap.classList.toggle('expanded', !collapsed);
    toggleBtn.textContent = collapsed ? '↓ Show full notes' : '↑ Collapse';
  };
  wrap.after(toggleBtn);

  // ── 3. Phrase chips — always visible, click to open popup ─────────────────
  if (terms.length) {
    const chipsWrap = document.createElement('div');
    chipsWrap.className = 'phrase-chips';
    const label = document.createElement('div');
    label.className = 'phrase-chips-label';
    label.textContent = '🔑 Key concepts — click to explore:';
    const row = document.createElement('div');
    row.className = 'phrase-chips-row';
    terms.forEach(({ term, li }) => {
      const chip = document.createElement('button');
      chip.className = 'phrase-chip';
      chip.textContent = term;
      chip.onclick = () => openTermDetail(term, li, moduleId);
      row.appendChild(chip);
    });
    chipsWrap.appendChild(label);
    chipsWrap.appendChild(row);
    toggleBtn.after(chipsWrap);
  }

  // ── 4. Restore saved highlights ──────────────────────────────────────────
  restoreHighlights(moduleId, mc);
}

function openTermDetail(term, li, moduleId) {
  const clone = li.cloneNode(true);
  clone.querySelectorAll('strong').forEach(s => {
    const m = document.createElement('strong');
    m.style.color = 'var(--ink)';
    m.textContent = s.textContent;
    s.replaceWith(m);
  });
  const fullText = clone.textContent.replace(term + ':', '').replace(term, '').trim();

  let extra = '';
  if (typeof FLASHCARDS !== 'undefined' && FLASHCARDS[moduleId]) {
    const card = FLASHCARDS[moduleId].find(c => c.q.toLowerCase().includes(term.toLowerCase().slice(0, 8)));
    if (card) extra = `<div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border)"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--ink3);margin-bottom:6px">📇 Related Flashcard</div><div style="font-size:13px;color:var(--ink2)">${card.a}</div></div>`;
  }

  showTermPopup(term, `<p>${fullText || 'See full notes for more detail on this concept.'}</p>${extra}`);
}

// ── Term popup ────────────────────────────────────────────────────────────────
function showTermPopup(term, bodyHtml) {
  document.getElementById('term-popup-title').textContent = term;
  document.getElementById('term-popup-body').innerHTML   = bodyHtml;
  document.getElementById('term-overlay').classList.remove('hidden');
}
function closeTermPopup(e) {
  if (e && e.target !== document.getElementById('term-overlay')) return;
  document.getElementById('term-overlay').classList.add('hidden');
}

// ── Highlighting ──────────────────────────────────────────────────────────────
let _hlText = '', _hlModId = null;

document.addEventListener('mouseup', () => {
  setTimeout(() => {
    const sel = window.getSelection();
    const txt = sel && sel.toString().trim();
    if (!txt || txt.length < 2) { hideHlBar(); return; }

    const range = sel.getRangeAt(0);
    let node = range.commonAncestorContainer;
    if (node.nodeType === 3) node = node.parentElement;
    const mc = node.closest('.module-content');
    if (!mc) { hideHlBar(); return; }

    const bodyEl = mc.closest('[id^="body-"]');
    _hlModId = bodyEl ? bodyEl.id.replace('body-', '') : null;
    _hlText  = txt;

    const rect = range.getBoundingClientRect();
    const tb   = document.getElementById('hl-toolbar');
    tb.classList.remove('hidden');
    // position:fixed so coords are viewport-relative — do NOT add scrollY
    const tbW = 190; // approximate toolbar width
    const left = Math.max(8, Math.min(window.innerWidth - tbW - 8, rect.left + rect.width / 2 - tbW / 2));
    const top  = Math.max(8, rect.top - 54);
    tb.style.left = left + 'px';
    tb.style.top  = top  + 'px';
  }, 10);
});

document.addEventListener('mousedown', e => {
  if (!e.target.closest('#hl-toolbar')) hideHlBar();
});

function hideHlBar() { document.getElementById('hl-toolbar').classList.add('hidden'); _hlText = ''; }

function applyHighlight(color) {
  if (!_hlText || !_hlModId) return;
  const mc = document.getElementById('body-' + _hlModId)?.querySelector('.module-content');
  if (!mc) return;

  const key = 'hl_' + _hlModId;
  const hls = JSON.parse(localStorage.getItem(key) || '[]');
  const idx = hls.findIndex(h => h.text === _hlText);
  if (idx >= 0) hls[idx].color = color; else hls.push({ text: _hlText, color });
  localStorage.setItem(key, JSON.stringify(hls));

  wrapTextInMark(mc, _hlText, color);
  hideHlBar();
  window.getSelection()?.removeAllRanges();
  toast('Highlighted!', 'success');
}

function eraseHighlight() {
  if (!_hlText || !_hlModId) return;
  const key = 'hl_' + _hlModId;
  const hls = JSON.parse(localStorage.getItem(key) || '[]').filter(h => h.text !== _hlText);
  localStorage.setItem(key, JSON.stringify(hls));
  const mc = document.getElementById('body-' + _hlModId)?.querySelector('.module-content');
  if (mc) { restoreHighlights(_hlModId, mc); }
  hideHlBar();
  window.getSelection()?.removeAllRanges();
}

function wrapTextInMark(container, text, color) {
  const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT);
  const nodes = [];
  let n;
  while ((n = walker.nextNode())) nodes.push(n);
  for (const tn of nodes) {
    const i = tn.textContent.indexOf(text);
    if (i === -1) continue;
    if (tn.parentElement.tagName === 'MARK') continue; // already wrapped
    const before = document.createTextNode(tn.textContent.slice(0, i));
    const mark   = document.createElement('mark');
    mark.className = 'hl hl-' + color;
    mark.textContent = text;
    const after = document.createTextNode(tn.textContent.slice(i + text.length));
    tn.replaceWith(before, mark, after);
    break;
  }
}

function restoreHighlights(moduleId, container) {
  const hls = JSON.parse(localStorage.getItem('hl_' + moduleId) || '[]');
  if (!hls.length) return;
  const mc = container || document.getElementById('body-' + moduleId)?.querySelector('.module-content');
  if (!mc) return;
  // Strip existing marks first
  mc.querySelectorAll('mark.hl').forEach(m => m.replaceWith(m.textContent));
  hls.forEach(({ text, color }) => wrapTextInMark(mc, text, color));
}

// ── Flashcard state (per module) ──────────────────────────────────────────────
const fcState = {};

function fcGetState(mid) {
  if (!fcState[mid]) {
    const cards = (typeof FLASHCARDS !== 'undefined' && FLASHCARDS[mid]) ? [...FLASHCARDS[mid]] : [];
    fcState[mid] = { cards, index: 0 };
  }
  return fcState[mid];
}

function flipCard(mid) {
  const card = document.getElementById('fc-card-' + mid);
  if (card) card.classList.toggle('flipped');
}

function fcNav(mid, dir) {
  const s = fcGetState(mid);
  s.index = Math.max(0, Math.min(s.cards.length - 1, s.index + dir));
  // Reset flip
  const card = document.getElementById('fc-card-' + mid);
  if (card) card.classList.remove('flipped');
  fcRender(mid);
}

function fcShuffle(mid) {
  const s = fcGetState(mid);
  for (let i = s.cards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [s.cards[i], s.cards[j]] = [s.cards[j], s.cards[i]];
  }
  s.index = 0;
  const card = document.getElementById('fc-card-' + mid);
  if (card) card.classList.remove('flipped');
  fcRender(mid);
  toast('Cards shuffled!', 'success');
}

function fcRender(mid) {
  const s = fcGetState(mid);
  const c = s.cards[s.index];
  if (!c) return;
  const front   = document.getElementById('fc-front-' + mid);
  const back    = document.getElementById('fc-back-' + mid);
  const counter = document.getElementById('fc-counter-' + mid);
  const prev    = document.getElementById('fc-prev-' + mid);
  const next    = document.getElementById('fc-next-' + mid);
  if (front)   front.textContent   = c.q;
  if (back)    back.textContent    = c.a;
  if (counter) counter.textContent = (s.index + 1) + ' / ' + s.cards.length;
  if (prev)    prev.disabled       = s.index === 0;
  if (next)    next.disabled       = s.index === s.cards.length - 1;
}
