<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<title>Community — StudyNest</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  .disc-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--rad-lg);
    padding: 20px 24px;
    box-shadow: var(--shadow-sm);
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .disc-card:hover { box-shadow: var(--shadow); border-color: var(--border2); transform: translateY(-1px); }
  .disc-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .disc-title { font-family: var(--fh); font-size: 16px; font-weight: 600; color: var(--ink); line-height: 1.35; flex: 1; }
  .disc-body-preview { font-size: 13px; color: var(--ink3); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .disc-footer { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .disc-author { display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--ink3); }
  .disc-author-av { width: 24px; height: 24px; border-radius: 50%; background: var(--acc-lt); color: var(--acc); font-size: 11px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .disc-replies { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--ink3); margin-left: auto; }
  .disc-replies-count { background: var(--bg2); padding: 2px 8px; border-radius: 100px; font-size: 12px; font-weight: 600; color: var(--ink2); }
  .cat-filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
  .cat-btn { padding: 6px 16px; border-radius: 100px; border: 1.5px solid var(--border); background: var(--surface); font-size: 13px; color: var(--ink2); cursor: pointer; transition: all 0.15s; }
  .cat-btn:hover, .cat-btn.active { background: var(--acc); border-color: var(--acc); color: #fff; }
</style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="sidebar-logo-mark">📚</div><span class="sidebar-logo-text">StudyNest</span></div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Main</div>
      <a class="sidebar-link" href="dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a>
      <a class="sidebar-link" href="courses.html"><span class="nav-icon">🎓</span> Courses</a>
      <a class="sidebar-link" href="notes.html"><span class="nav-icon">📝</span> My Notes</a>
      <a class="sidebar-link" href="quiz.html"><span class="nav-icon">🧠</span> Quizzes</a>
      <a class="sidebar-link active" href="discussions.html"><span class="nav-icon">💬</span> Community</a>
      <div class="sidebar-section-label">Account</div>
      <a class="sidebar-link" href="profile.html"><span class="nav-icon">👤</span> Profile</a>
    </nav>
    <div class="sidebar-user">
      <div class="sidebar-avatar" id="sb-avatar">?</div>
      <div><div class="sidebar-user-name" id="sb-name">Loading…</div><div class="sidebar-user-role">Student</div></div>
      <button class="sidebar-user-logout" onclick="logout()" title="Log out">↩</button>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <span class="topbar-title">Community</span>
      <div class="topbar-search">
        <span class="topbar-search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Search discussions…" oninput="renderList()">
      </div>
      <div class="topbar-actions">
        <button class="btn btn-primary btn-sm" onclick="openModal('new-modal')">+ New Discussion</button>
        <div class="avatar-placeholder avatar-sm" id="topbar-avatar" style="cursor:pointer" onclick="location.href='profile.html'">?</div>
      </div>
    </header>

    <div class="page-body">
      <div class="page-hero">
        <h1>Community Discussions</h1>
        <p>Ask questions, share knowledge, and help fellow students across all topics.</p>
      </div>

      <!-- Sort tabs -->
      <div class="tab-bar" style="margin-bottom:16px">
        <button class="tab-item active" onclick="setSort('newest', this)">🕐 Newest</button>
        <button class="tab-item" onclick="setSort('active', this)">🔥 Most Active</button>
        <button class="tab-item" onclick="setSort('mine', this)">👤 My Posts</button>
      </div>

      <!-- Category filters -->
      <div class="cat-filters" id="cat-filters">
        <button class="cat-btn active" onclick="setCategory('', this)">All Topics</button>
        <button class="cat-btn" onclick="setCategory('Cybersecurity', this)">🔐 Cybersecurity</button>
        <button class="cat-btn" onclick="setCategory('Web Dev', this)">🌐 Web Dev</button>
        <button class="cat-btn" onclick="setCategory('Databases', this)">🗄️ Databases</button>
        <button class="cat-btn" onclick="setCategory('Data Science', this)">🤖 Data Science</button>
        <button class="cat-btn" onclick="setCategory('DevOps', this)">☁️ DevOps</button>
        <button class="cat-btn" onclick="setCategory('General', this)">💬 General</button>
      </div>

      <!-- Count -->
      <div style="font-size:13px;color:var(--ink3);margin-bottom:16px" id="disc-count"></div>

      <!-- List -->
      <div id="disc-list" style="display:flex;flex-direction:column;gap:12px"></div>
    </div>
  </div>
</div>

<!-- New Discussion Modal -->
<div class="modal-overlay" id="new-modal">
  <div class="modal">
    <div class="modal-header">
      <h4>Start a Discussion</h4>
      <button class="modal-close" onclick="closeModal('new-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div id="new-error" style="display:none;background:var(--red-lt);border:1px solid var(--red);border-radius:var(--rad);padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:16px"></div>
      <div class="form-group">
        <label class="form-label">Title</label>
        <input class="form-input" id="new-title" type="text" placeholder="What do you want to discuss?">
      </div>
      <div class="form-group">
        <label class="form-label">Category</label>
        <select class="form-input" id="new-category">
          <option value="General">💬 General</option>
          <option value="Cybersecurity">🔐 Cybersecurity</option>
          <option value="Web Dev">🌐 Web Dev</option>
          <option value="Databases">🗄️ Databases</option>
          <option value="Data Science">🤖 Data Science</option>
          <option value="DevOps">☁️ DevOps</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Body</label>
        <textarea class="form-input" id="new-body" rows="5" placeholder="Describe your question or topic in detail…" style="resize:vertical"></textarea>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button class="btn btn-ghost" onclick="closeModal('new-modal')">Cancel</button>
        <button class="btn btn-primary" id="post-btn" onclick="postDiscussion()">Post Discussion</button>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="../js/app.js"></script>
<script>
initPage();

const CAT_ICONS = {
  'Cybersecurity': '🔐', 'Web Dev': '🌐', 'Databases': '🗄️',
  'Data Science': '🤖', 'DevOps': '☁️', 'General': '💬'
};
const CAT_COLORS = {
  'Cybersecurity': 'badge-red', 'Web Dev': 'badge-blue', 'Databases': 'badge-amber',
  'Data Science': 'badge-green', 'DevOps': 'badge-gray', 'General': 'badge-gray'
};

let allDiscs   = [];
let activeSort = 'newest';
let activeCat  = '';

function setSort(sort, el) {
  activeSort = sort;
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  loadDiscussions();
}

function setCategory(cat, el) {
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  loadDiscussions();
}

async function loadDiscussions() {
  const params = new URLSearchParams({ sort: activeSort });
  if (activeCat) params.set('category', activeCat);
  const data = await api('GET', '/discussions?' + params);
  if (!data) return;
  allDiscs = data;
  renderList();
}

function renderList() {
  const q    = document.getElementById('search-input').value.trim().toLowerCase();
  const list = q
    ? allDiscs.filter(d => d.title.toLowerCase().includes(q) || d.body.toLowerCase().includes(q))
    : allDiscs;

  document.getElementById('disc-count').textContent = list.length + ' discussion' + (list.length !== 1 ? 's' : '');

  if (!list.length) {
    document.getElementById('disc-list').innerHTML = `
      <div class="empty-state" style="padding:60px 24px">
        <div class="empty-state-icon">💬</div>
        <h4>No discussions yet</h4>
        <p>Be the first to start a conversation!</p>
        <button class="btn btn-primary btn-sm" style="margin-top:12px" onclick="openModal('new-modal')">+ Start Discussion</button>
      </div>`;
    return;
  }

  document.getElementById('disc-list').innerHTML = list.map(d => {
    const icon  = CAT_ICONS[d.category]  || '💬';
    const badge = CAT_COLORS[d.category] || 'badge-gray';
    const name  = (d.first_name + ' ' + (d.last_name || '')).trim();
    return `
      <div class="disc-card" onclick="location.href='discussion-detail.html?id=${d.id}'">
        <div class="disc-card-top">
          <div style="flex:1;min-width:0">
            <span class="badge ${badge}" style="margin-bottom:8px;display:inline-flex">${icon} ${d.category}</span>
            <div class="disc-title">${escHtml(d.title)}</div>
          </div>
        </div>
        <div class="disc-body-preview">${escHtml(d.body)}</div>
        <div class="disc-footer">
          <div class="disc-author">
            <div class="disc-author-av">${d.avatar || '👤'}</div>
            <span>${escHtml(name)}</span>
            <span>·</span>
            <span>${timeAgo(d.created_at)}</span>
          </div>
          <div class="disc-replies" style="margin-left:auto">
            <span>💬</span>
            <span class="disc-replies-count">${d.reply_count} ${d.reply_count === 1 ? 'reply' : 'replies'}</span>
          </div>
        </div>
      </div>`;
  }).join('');
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function postDiscussion() {
  const title    = document.getElementById('new-title').value.trim();
  const body     = document.getElementById('new-body').value.trim();
  const category = document.getElementById('new-category').value;
  const errDiv   = document.getElementById('new-error');
  const btn      = document.getElementById('post-btn');

  errDiv.style.display = 'none';
  if (!title) { errDiv.textContent = 'Please enter a title.'; errDiv.style.display = 'block'; return; }
  if (!body)  { errDiv.textContent = 'Please write something in the body.'; errDiv.style.display = 'block'; return; }

  btn.disabled = true; btn.textContent = 'Posting…';
  const res = await api('POST', '/discussions', { title, body, category });
  btn.disabled = false; btn.textContent = 'Post Discussion';

  if (res) {
    closeModal('new-modal');
    document.getElementById('new-title').value = '';
    document.getElementById('new-body').value  = '';
    toast('Discussion posted! 🎉', 'success');
    loadDiscussions();
  }
}

loadDiscussions();
</script>
</body>
</html>
