<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Notes — StudyNest</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  .notes-shell { display: grid; grid-template-columns: 300px 1fr; height: calc(100vh - var(--topbar-h)); overflow: hidden; }
  .notes-sidebar { border-right: 1px solid var(--border); overflow-y: auto; background: var(--surface); display: flex; flex-direction: column; }
  .notes-sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .notes-list { flex: 1; overflow-y: auto; padding: 8px; }
  .note-item { padding: 12px; border-radius: var(--rad); cursor: pointer; margin-bottom: 4px; border: 1.5px solid transparent; transition: all .15s; }
  .note-item:hover { background: var(--bg2); }
  .note-item.active { background: var(--acc-lt); border-color: var(--acc); }
  .note-item-title { font-weight: 600; font-size: 14px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .note-item-meta { font-size: 12px; color: var(--ink3); margin-top: 3px; display: flex; justify-content: space-between; }
  .note-item-preview { font-size: 12px; color: var(--ink3); margin-top: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .editor-panel { display: flex; flex-direction: column; overflow: hidden; }
  .editor-toolbar { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; flex-shrink: 0; background: var(--surface); }
  .tb-btn { width: 30px; height: 30px; border: 1px solid var(--border); background: var(--surface); border-radius: var(--rad-sm); font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--ink2); transition: all .15s; }
  .tb-btn:hover { background: var(--bg2); border-color: var(--border2); }
  .editor-meta { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; align-items: center; flex-shrink: 0; background: var(--surface2); }
  .editor-body { flex: 1; padding: 24px; overflow-y: auto; }
  #note-content { min-height: 400px; outline: none; font-size: 15px; line-height: 1.8; color: var(--ink); }
  #note-content:empty:before { content: 'Start writing your note…'; color: var(--ink3); }
  .tag-chip { display: inline-flex; align-items: center; gap: 5px; background: var(--acc-lt); color: var(--acc); font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 100px; }
  .tag-chip button { background: none; border: none; color: var(--acc); cursor: pointer; font-size: 14px; padding: 0; line-height: 1; }
  .save-indicator { font-size: 12px; color: var(--ink3); margin-left: auto; }
  .empty-editor { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--ink3); gap: 12px; }
</style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="sidebar-logo-mark">📚</div><span class="sidebar-logo-text">StudyNest</span></div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Main</div>
      <a class="sidebar-link" href="dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a>
      <a class="sidebar-link" href="courses.html"><span class="nav-icon">🎓</span> Courses</a>
      <a class="sidebar-link active" href="notes.html"><span class="nav-icon">📝</span> My Notes</a>
      <a class="sidebar-link" href="quiz.html"><span class="nav-icon">🧠</span> Quizzes</a>
      <a class="sidebar-link" href="ai-tutor.html"><span class="nav-icon">🤖</span> AI Tutor</a>
      <div class="sidebar-section-label">Account</div>
      <a class="sidebar-link" href="profile.html"><span class="nav-icon">👤</span> Profile</a>
    </nav>
    <div class="sidebar-user">
      <div class="sidebar-avatar" id="sb-avatar">?</div>
      <div><div class="sidebar-user-name" id="sb-name">Loading…</div><div class="sidebar-user-role">Student</div></div>
      <button class="sidebar-user-logout" onclick="logout()" title="Log out">↩</button>
    </div>
  </aside>

  <div class="main-content" style="display:flex;flex-direction:column">
    <header class="topbar">
      <span class="topbar-title">My Notes</span>
      <div class="topbar-search">
        <span class="topbar-search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Search notes…" oninput="loadNotes()">
      </div>
      <div class="topbar-actions">
        <button class="btn btn-primary btn-sm" onclick="newNote()">+ New Note</button>
        <div class="avatar-placeholder avatar-sm" id="topbar-avatar" style="cursor:pointer" onclick="location.href='profile.html'">?</div>
      </div>
    </header>

    <div class="notes-shell">
      <!-- Sidebar -->
      <div class="notes-sidebar">
        <div class="notes-sidebar-header">
          <select class="form-input" id="filter-subject" style="font-size:13px;padding:7px 10px" onchange="loadNotes()">
            <option value="">All Subjects</option>
          </select>
        </div>
        <div class="notes-list" id="notes-list">
          <div style="text-align:center;padding:32px;color:var(--ink3)">Loading…</div>
        </div>
      </div>

      <!-- Editor -->
      <div class="editor-panel" id="editor-panel">
        <div class="empty-editor" id="empty-editor">
          <div style="font-size:48px">📝</div>
          <h3>Select or create a note</h3>
          <p>Pick a note from the list or click <strong>+ New Note</strong></p>
        </div>

        <div id="editor-area" style="display:none;flex:1;display:none;flex-direction:column;overflow:hidden">
          <div class="editor-toolbar">
            <button class="tb-btn" onclick="fmt('bold')" title="Bold"><b>B</b></button>
            <button class="tb-btn" onclick="fmt('italic')" title="Italic"><i>I</i></button>
            <button class="tb-btn" onclick="fmt('underline')" title="Underline"><u>U</u></button>
            <div style="width:1px;height:20px;background:var(--border);margin:0 4px"></div>
            <button class="tb-btn" onclick="fmt('insertUnorderedList')" title="Bullet list">•≡</button>
            <button class="tb-btn" onclick="fmt('insertOrderedList')" title="Numbered list">1≡</button>
            <div style="width:1px;height:20px;background:var(--border);margin:0 4px"></div>
            <button class="tb-btn" onclick="fmtBlock('h2')" title="Heading">H</button>
            <button class="tb-btn" onclick="fmtBlock('blockquote')" title="Quote">"</button>
            <button class="tb-btn" onclick="fmtBlock('pre')" title="Code">&lt;/&gt;</button>
            <span class="save-indicator" id="save-indicator">—</span>
            <button class="tb-btn" onclick="deleteNote()" title="Delete note" style="margin-left:4px;color:var(--red);border-color:var(--red)">🗑</button>
          </div>

          <div class="editor-meta">
            <input type="text" id="note-title" class="form-input" placeholder="Note title…"
              style="flex:1;font-size:16px;font-weight:600" oninput="scheduleSave()">
            <select class="form-input" id="note-subject" style="width:auto;font-size:13px;padding:7px 10px" onchange="scheduleSave()">
              <option value="">No subject</option>
              <option>Cybersecurity</option>
              <option>Web Dev</option>
              <option>Databases</option>
              <option>Data Science</option>
              <option>DevOps</option>
              <option>Other</option>
            </select>
          </div>

          <div style="padding:10px 20px;border-bottom:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0">
            <span style="font-size:12px;color:var(--ink3);font-weight:600">TAGS:</span>
            <div id="tags-container" style="display:flex;gap:6px;flex-wrap:wrap"></div>
            <input type="text" id="tag-input" placeholder="Add tag…" style="border:none;background:none;outline:none;font-size:12px;color:var(--ink2);width:80px"
              onkeydown="if(event.key==='Enter'||event.key===','){event.preventDefault();addTag(this.value.trim());this.value=''}">
          </div>

          <div class="editor-body">
            <div id="note-content" contenteditable="true" oninput="scheduleSave()"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="../js/app.js"></script>
<script>
initPage();

let activeNoteId = null;
let saveTimer    = null;
let tags         = [];

// ── Load notes list ───────────────────────────────────────────────────────────
async function loadNotes() {
  const search  = document.getElementById('search-input').value.trim();
  const subject = document.getElementById('filter-subject').value;
  const params  = new URLSearchParams();
  if (search)  params.set('search', search);
  if (subject) params.set('subject', subject);

  const notes = await api('GET', '/notes?' + params);
  if (!notes) return;

  if (!notes.length) {
    document.getElementById('notes-list').innerHTML = `
      <div class="empty-state" style="padding:32px 16px">
        <div class="empty-state-icon">📝</div>
        <h4>No notes yet</h4>
        <p>Click <strong>+ New Note</strong> to get started.</p>
      </div>`;
    return;
  }

  document.getElementById('notes-list').innerHTML = notes.map(n => `
    <div class="note-item ${n.id === activeNoteId ? 'active' : ''}" onclick="openNote(${n.id})">
      <div class="note-item-title">${escHtml(n.title || 'Untitled')}</div>
      <div class="note-item-preview">${stripHtml(n.content || '')}</div>
      <div class="note-item-meta">
        <span>${n.subject || 'No subject'}</span>
        <span>${formatDate(n.updated_at)}</span>
      </div>
    </div>`).join('');
}

// ── Load subject filters ──────────────────────────────────────────────────────
async function loadSubjects() {
  const subs = await api('GET', '/notes/subjects/list');
  if (!subs) return;
  const sel = document.getElementById('filter-subject');
  subs.forEach(s => {
    const o = document.createElement('option'); o.value = o.textContent = s; sel.appendChild(o);
  });
}

// ── Open a note in the editor ─────────────────────────────────────────────────
async function openNote(id) {
  const note = await api('GET', '/notes/' + id);
  if (!note) return;

  activeNoteId = id;
  tags = note.tags ? note.tags.split(',').filter(Boolean) : [];

  document.getElementById('note-title').value   = note.title || '';
  document.getElementById('note-subject').value = note.subject || '';
  document.getElementById('note-content').innerHTML = note.content || '';
  renderTags();
  showEditor();
  loadNotes();
  setSaveIndicator('saved');
}

// ── New note ──────────────────────────────────────────────────────────────────
async function newNote() {
  const note = await api('POST', '/notes', { title: 'Untitled Note', content: '', subject: '', tags: '' });
  if (!note) return;
  activeNoteId = note.id;
  tags = [];
  document.getElementById('note-title').value      = note.title;
  document.getElementById('note-subject').value    = '';
  document.getElementById('note-content').innerHTML = '';
  renderTags();
  showEditor();
  loadNotes();
  document.getElementById('note-title').focus();
  document.getElementById('note-title').select();
  setSaveIndicator('saved');
}

// ── Auto-save ─────────────────────────────────────────────────────────────────
function scheduleSave() {
  setSaveIndicator('unsaved');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveNote, 1200);
}

async function saveNote() {
  if (!activeNoteId) return;
  setSaveIndicator('saving');
  await api('PUT', '/notes/' + activeNoteId, {
    title:   document.getElementById('note-title').value   || 'Untitled Note',
    content: document.getElementById('note-content').innerHTML,
    subject: document.getElementById('note-subject').value,
    tags:    tags.join(','),
  });
  setSaveIndicator('saved');
  loadNotes();
}

function setSaveIndicator(state) {
  const el = document.getElementById('save-indicator');
  if (state === 'saving')  { el.textContent = '💾 Saving…'; el.style.color = 'var(--amb)'; }
  if (state === 'saved')   { el.textContent = '✓ Saved';    el.style.color = 'var(--acc)'; }
  if (state === 'unsaved') { el.textContent = '● Unsaved';  el.style.color = 'var(--ink3)'; }
}

// ── Delete note ───────────────────────────────────────────────────────────────
async function deleteNote() {
  if (!activeNoteId || !confirm('Delete this note?')) return;
  await api('DELETE', '/notes/' + activeNoteId);
  activeNoteId = null;
  hideEditor();
  loadNotes();
  toast('Note deleted.', '');
}

// ── Tags ──────────────────────────────────────────────────────────────────────
function addTag(tag) {
  if (!tag || tags.includes(tag)) return;
  tags.push(tag);
  renderTags();
  scheduleSave();
}
function removeTag(tag) {
  tags = tags.filter(t => t !== tag);
  renderTags();
  scheduleSave();
}
function renderTags() {
  document.getElementById('tags-container').innerHTML = tags.map(t =>
    `<span class="tag-chip">${escHtml(t)}<button onclick="removeTag('${escHtml(t)}')">×</button></span>`
  ).join('');
}

// ── Formatting ────────────────────────────────────────────────────────────────
function fmt(cmd)       { document.execCommand(cmd, false, null); document.getElementById('note-content').focus(); scheduleSave(); }
function fmtBlock(tag)  { document.execCommand('formatBlock', false, tag); document.getElementById('note-content').focus(); scheduleSave(); }

// ── Helpers ───────────────────────────────────────────────────────────────────
function showEditor() {
  document.getElementById('empty-editor').style.display = 'none';
  const ea = document.getElementById('editor-area');
  ea.style.display = 'flex';
}
function hideEditor() {
  document.getElementById('empty-editor').style.display = 'flex';
  document.getElementById('editor-area').style.display  = 'none';
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function stripHtml(s) {
  const d = document.createElement('div'); d.innerHTML = s; return d.textContent || '';
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadSubjects();
loadNotes().then(() => {
  if (new URLSearchParams(location.search).get('new') === '1') newNote();
});
</script>
</body>
</html>
